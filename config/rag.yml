# RAG配置

# 云端聊天模型
cloud_chat_model_name: qwen3-max

# Embedding配置
embedding:
  provider: ollama  # 可选值: azure, openai, deepseek, ollama
  model: Mxbai-embed-large
  base_url: http://localhost:11434
  # Azure OpenAI配置
  azure_endpoint: https://your-resource.openai.azure.com/
  azure_deployment_name: your-embedding-deployment
  api_key: ""  # 建议通过环境变量或密钥管理服务设置
  
# 嵌入模型名称（兼容旧配置）
embedding_model_name: text-embedding-v4

# 检索配置
retrieval:
  top_k: 5
  hybrid_weight: 0.5        # 混合权重（0-1，用于weighted融合方法）
  chunk_size: 512
  chunk_overlap: 64
  bm25_k1: 1.5              # BM25参数：控制词频饱和
  bm25_b: 0.75              # BM25参数：控制文档长度影响
  rrf_k: 60                 # RRF融合参数
  bm25_weight: 0.5          # BM25检索权重（0-1，用于RRF融合）
  vector_weight: 0.5        # 向量检索权重（0-1，用于RRF融合）
  fusion_method: rrf        # 融合方法：rrf 或 weighted

# 重排配置
rerank:
  method: linear  # 可选值: linear, cross_encoder, llm
  cross_encoder_model: BAAI/bge-reranker-base  # Cross-Encoder模型名称
  llm_rerank_prompt: ""  # 自定义LLM重排提示词（可选）

# 缓存配置
cache:
  enable_cache: true  # 是否启用查询缓存
  query_cache_size: 500  # 查询缓存最大条目数
  query_cache_ttl: 60  # 查询缓存过期时间（分钟）
  llm_cache_size: 200  # LLM响应缓存最大条目数
  llm_cache_ttl: 30  # LLM响应缓存过期时间（分钟）
