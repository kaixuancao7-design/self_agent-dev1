# Agent配置

# 外部数据路径
external_data_path: data\external\records.csv

# LLM配置
llm:
  provider: ollama  # 可选值: azure, openai, deepseek, ollama, tongyi
  model: qwen3.5:9b
  base_url: http://localhost:11434
  # Azure OpenAI配置
  azure_endpoint: https://your-resource.openai.azure.com/
  azure_deployment_name: your-deployment
  api_key: ""  # 建议通过环境变量或密钥管理服务设置

# 重试配置
retry_max_attempts: 3
retry_backoff_seconds: 2
fallback_to_cloud: true

# 功能开关
enable_advanced_features: true  # 是否启用高级能力（任务拆解、路径规划、自我评估、事实核查）
enable_memory: true  # 是否启用记忆管理（短期记忆+长期记忆）

# 用户配置
user_ids:
  - USER_001
  - USER_002
  - USER_003
  - USER_004
  - USER_005

user_locations:
  - 北京市朝阳区
  - 上海市浦东新区
  - 广州市天河区
  - 深圳市南山区

# Firecrawl配置
firecrawl:
  api_key: "FIRECRAWL_API_KEY"  # 建议通过环境变量 FIRECRAWL_API_KEY 设置
  base_url: https://api.firecrawl.dev

# LangGraph工作流配置
langgraph:
  enabled: true  # 是否启用LangGraph工作流
  max_steps: 10  # 最大执行步骤
  checkpoint: false  # 是否启用检查点（用于持久化状态）
  verbose: true  # 是否输出详细日志
  auto_switch: true  # 是否自动切换模式
  complexity_threshold: 50  # 复杂度阈值（字符数），超过此值自动使用LangGraph
